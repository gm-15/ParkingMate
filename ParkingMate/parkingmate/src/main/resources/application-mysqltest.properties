# MySQL 타이밍 테스트 전용 프로파일
# 대상: parkingmate-mysql-test (Docker, port 3307)
# 용도: H2 대비 현실적인 커넥션 점유 시간 측정

# MySQL 연결
spring.datasource.url=jdbc:mysql://localhost:3307/parkingmate?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=parkingmate
spring.datasource.password=parkingmate123!

# Hikari 풀 설정 (측정 의도 명확화)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=TimingTestPool

# JPA - 테이블 자동 생성 (테스트 후 drop)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false

# Redis (로컬)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms

# AWS S3 비활성화
aws.s3.enabled=false
aws.s3.bucket=parkingmate-images
aws.s3.region=ap-northeast-2
