spring.application.name=ParkingMate
spring.profiles.active=local

# JWT Settings
jwt.secret=this-is-a-super-secret-key-for-your-parking-mate-project-1234
jwt.expiration=3600000

# JPA Settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Phase 3: Graceful Shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Phase 3: Resilience4j — CircuitBreaker (Redis 분산락 보호)
resilience4j.circuitbreaker.instances.redis-lock.sliding-window-size=10
resilience4j.circuitbreaker.instances.redis-lock.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.redis-lock.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.redis-lock.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.redis-lock.register-health-indicator=true

# Phase 3: Resilience4j — Bulkhead (동시 예약 요청 제한)
resilience4j.bulkhead.instances.booking.max-concurrent-calls=20
resilience4j.bulkhead.instances.booking.max-wait-duration=0
